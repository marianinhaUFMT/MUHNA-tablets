<!DOCTYPE html>

    <script>
        const dadosDasPlantas = {
            'embirucu-peludo': {
                titulo: 'EMBIRUÇÚ PELUDO',

                imagemPrincipal: '../images/quadro1/embirucu-pelado.jpg',
