<!DOCTYPE html>
<html lang="en">
<head>

    <title>Quadro 2: Embaúba</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <header>
        <a href="../index.html" class="link-voltar">&larr; Voltar para a galeria</a>
        <h1>Embaúba</h1>
        <p>Toque na imagem para saber mais e ver outras fotos.</p>
    </header>
    <main>
        <div class="quadro-container">
            <img id="folha-clicavel" 
                 class="imagem-quadro"
                 src="../images/quadro2/embauba.jpg" 
                 alt="Folha de Embaúba">
        </div>
    </main>

    <div id="modal-planta" class="modal-overlay">
        <div class="modal-content">
            <button class="modal-close-btn">&times;</button>
            <img id="modal-img" src="" alt="Imagem da Planta">
            <h2 id="modal-titulo"></h2>
            <h3 id="modal-nome-cientifico"></h3>
            <p id="modal-descricao"></p>
            
            <div class="modal-galeria-container">
                <h4>Mais Imagens</h4>
                <div id="modal-galeria" class="modal-galeria">
                    </div>
            </div>
        </div>
    </div>

    <script>
        const dadosDasPlantas = {
            'embauba': {
                titulo: 'EMBAÚBA',
                nomeCientifico: 'Cecropia pachystachya',
                descricao: 'Árvore de 4 a 7 m de altura, com tronco de casca cinzenta com manchas brancas e com marcas deixada pela queda das folhas. A copa tem forma de taça com galhos bem distribuídos e ascendentes. A inflorescência é axilar (no encontro da junção da folha com o ramo) e espiciforme (em forma de espiga) com inúmeras flores minúsculas e unissexuais. Árvore pode ser usada em reflorestamento como pioneira por ter crescimento rápido, resistir a seca e produzir alimento para os pássaros.',

                imagemPrincipal: '../images/quadro2/embauba1.jpg',
                galeria: [
                    '../images/quadro2/embauba2.jpg',

                ]

    <script src="../script.js"></script>
