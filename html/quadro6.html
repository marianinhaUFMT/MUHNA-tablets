<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quadro 6: Folhas Compostas Pinadas</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>

    <header>
        <a href="../index.html" class="link-voltar">&larr; Voltar para a galeria</a>
        <h1>Folhas Compostas Pinadas</h1>
        <p>Toque em uma folha para saber mais sobre a planta.</p>
    </header>

    <main>
        <div class="quadro-container">
            <img src="../images/quadro6/folhas_compostas_pinadas.jpg" usemap="#image-map" alt="Quadro com folhas compostas pinadas">
            
            <map name="image-map">
                <area target="_self" alt="Mamica de Porca" title="Mamica de Porca" href="#" coords="137,181,135" shape="circle" data-planta="mamica-de-porca">
                <area target="_self" alt="Amargosa" title="Amargosa" href="#" coords="447,204,144" shape="circle" data-planta="amargosa">
                <area target="_self" alt="Ingá de Metro" title="Ingá de Metro" href="#" coords="151,582,141" shape="circle" data-planta="inga-de-metro">
                <area target="_self" alt="Caneleiro, Cássia Rodoviária" title="Caneleiro, Cássia Rodoviária" href="#" coords="458,585,131" shape="circle" data-planta="caneleiro-cassia-rodoviaria">
            </map>
        </div>
    </main>

    <div id="modal-planta" class="modal-overlay">
        <div class="modal-content">
            <button class="modal-close-btn">&times;</button>
            <img id="modal-img" src="" alt="Imagem da Planta">
            <h2 id="modal-titulo"></h2>
            <h3 id="modal-nome-cientifico"></h3>
            <p id="modal-descricao"></p>
            
            <div class="modal-galeria-container">
                <h4>Mais Imagens</h4>
                <div id="modal-galeria" class="modal-galeria"></div>
            </div>
        </div>
    </div>

    <script>
        const dadosDasPlantas = {

</html>
