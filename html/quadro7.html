    <link rel="stylesheet" href="../style.css">

<body>
    <header>
        <a href="../index.html" class="link-voltar">&larr; Voltar para a galeria</a>

    </header>

    <main>
        <div class="quadro-container">
            <img src="../images/quadro7/folhas-palmadas-digitadas.jpg" usemap="#image-map" alt="Quadro com folhas compostas palmadas ou digitadas">
            <map name="image-map">
                <area target="_self" alt="Ipê Amarelo da Mata" title="Ipê Amarelo da Mata" href="#" coords="148,135,111" shape="circle" data-planta="ipe-amarelo-da-mata">

                <area target="_self" alt="Paineira do Cerrado" title="Paineira do Cerrado" href="#" coords="143,634,121" shape="circle" data-planta="paineira-do-cerrado">
                <area target="_self" alt="Ipê Caraíba" title="Ipê Caraíba" href="#" coords="469,589,105" shape="circle" data-planta="ipe-caraiba">

        </div>

            <div class="modal-galeria-container">
